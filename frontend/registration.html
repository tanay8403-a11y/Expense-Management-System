<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account - Expense Management System</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background-color:#0f172a;
}

.form-card{
background:#ffffff;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.input-field{
border:1px solid #e2e8f0;
border-radius:6px;
}

.btn-primary{
background:#2563eb;
}

</style>

</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4">


<div class="text-center mb-8">

<div class="inline-flex items-center justify-center w-12 h-12 bg-blue-600 rounded-lg mb-4">

<svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">

<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>

</svg>

</div>

<h1 class="text-3xl font-bold text-white mb-2">Expense System</h1>
<p class="text-slate-400">Manage your finances with precision</p>

</div>



<div class="form-card w-full max-w-md p-8">

<h2 class="text-2xl font-bold text-gray-900 text-center mb-6">
Create Account
</h2>


<form class="space-y-4">

<div>
<input id="fullname"
type="text"
placeholder="Full Name"
class="input-field w-full px-4 py-3 focus:ring-2 focus:ring-blue-500">
</div>


<div>
<input id="username"
type="text"
placeholder="Username"
class="input-field w-full px-4 py-3 focus:ring-2 focus:ring-blue-500">
</div>


<div>
<input id="password"
type="password"
placeholder="Password"
class="input-field w-full px-4 py-3 focus:ring-2 focus:ring-blue-500">
</div>


<div>
<input id="sport"
type="text"
placeholder="Favorite Sport (Security Question)"
class="input-field w-full px-4 py-3 focus:ring-2 focus:ring-blue-500">
</div>


<button
type="button"
onclick="registerUser()"
class="btn-primary w-full py-3 text-white font-semibold rounded-md hover:bg-blue-700">

Register

</button>

</form>


<div class="mt-6 text-center">

<a href="login.html"
class="text-sm font-medium text-blue-600 hover:text-blue-500">

Back to Login

</a>

</div>

</div>



<script src="js/registration.js"></script>

</body>
</html>
