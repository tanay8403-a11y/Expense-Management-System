<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Expense Management System</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="typography">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
              900: '#0c4a6e',
            },
            slate: {
              850: '#1e293b',
              950: '#020617',
            }
          }
        }
      }
    }
  </script>
<style data-purpose="custom-background">    .bg-pattern {
      background-color: #020617;
      background-image: radial-gradient(at 0% 0%, hsla(215,94%,11%,1) 0, transparent 50%), 
                        radial-gradient(at 50% 0%, hsla(221,72%,33%,1) 0, transparent 50%), 
                        radial-gradient(at 100% 0%, hsla(215,94%,11%,1) 0, transparent 50%);
      position: relative;
    }
    .bg-pattern::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }
  </style></head>
<body class="bg-pattern min-h-screen flex flex-col items-center justify-center p-4">
<!-- BEGIN: MainContent -->
<main class="w-full max-w-md" data-purpose="login-container"><section class="text-center mb-10" data-purpose="page-title">
<div class="inline-flex items-center justify-center w-16 h-16 bg-brand-600 rounded-2xl shadow-lg mb-4">
<svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h1 class="text-3xl font-bold text-white tracking-tight">Expense System</h1>
<p class="text-slate-400 mt-2">Manage your finances with precision</p>
</section>
<!-- BEGIN: HeaderSection -->
<!-- END: HeaderSection -->
<!-- BEGIN: LoginCard -->
<div class="bg-white rounded-2xl shadow-2xl overflow-hidden" data-purpose="login-card">
<div class="p-8 sm:p-10"><div class="text-center mb-8">
<h2 class="text-2xl font-bold text-slate-900 mb-2">Reset Password</h2>
<p class="text-slate-500 text-sm">Enter your username and new password</p>
</div>
<form action="#" class="space-y-4" method="POST">
<div data-purpose="form-group-username">
<input class="block w-full px-4 py-3 border border-slate-200 rounded-lg leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm transition duration-150 ease-in-out" id="username" name="username" placeholder="Username" required="" type="text"/>
</div>
<div data-purpose="form-group-sport">
<input class="block w-full px-4 py-3 border border-slate-200 rounded-lg leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm transition duration-150 ease-in-out" id="sport" name="sport" placeholder="Favorite Sport" required="" type="text"/>
</div>
<div data-purpose="form-group-password">
<input class="block w-full px-4 py-3 border border-slate-200 rounded-lg leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm transition duration-150 ease-in-out" id="password" name="password" placeholder="New Password" required="" type="password"/>
</div>
<div class="pt-2" data-purpose="login-action">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-[#2563eb] hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200" type="button" onclick="resetPassword()">
      Update Password
    </button>
</div>
</form>
<div class="mt-8 text-center">
<a class="text-sm text-blue-600 hover:text-blue-500 font-medium" href="login.html">Back to Login</a>
</div></div>
<!-- Card Footer Information -->
</div>
<!-- END: LoginCard -->
</main>
<!-- END: MainContent -->
 <script src="js/forgot.js"></script>

</body></html>
