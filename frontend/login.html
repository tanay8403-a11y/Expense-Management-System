<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Expense Management System</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-background">
    /* Subtle geometric pattern overlay on gradient */
    .bg-pattern {
      background-color: #0f172a;
      background-image: radial-gradient(at 0% 0%, hsla(215,94%,11%,1) 0, transparent 50%), 
                        radial-gradient(at 50% 0%, hsla(221,72%,33%,1) 0, transparent 50%), 
                        radial-gradient(at 100% 0%, hsla(215,94%,11%,1) 0, transparent 50%);
      position: relative;
    }
    .bg-pattern::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }
  </style>
<style data-purpose="typography">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
              900: '#0c4a6e',
            },
            slate: {
              850: '#1e293b',
              950: '#020617',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-pattern min-h-screen flex flex-col items-center justify-center p-4">
<!-- BEGIN: MainContent -->
<main class="w-full max-w-md" data-purpose="login-container">
<!-- BEGIN: HeaderSection -->
<section class="text-center mb-10" data-purpose="page-title">
<div class="inline-flex items-center justify-center w-16 h-16 bg-brand-600 rounded-2xl shadow-lg mb-4">
<!-- SVG Icon representing Finance/Expense -->
<svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h1 class="text-3xl font-bold text-white tracking-tight">Expense System</h1>
<p class="text-slate-400 mt-2">Manage your finances with precision</p>
</section>
<!-- END: HeaderSection -->
<!-- BEGIN: LoginCard -->
<div class="bg-white rounded-2xl shadow-2xl overflow-hidden" data-purpose="login-card">
<div class="p-8 sm:p-10">
<h2 class="text-2xl font-semibold text-slate-900 mb-2">Welcome back</h2>
<p class="text-slate-500 mb-8 text-sm">Please enter your details to sign in.</p>
<form class="space-y-6" onsubmit="loginUser(event)">
<!-- Username Input -->
<div data-purpose="form-group-username">
<label class="block text-sm font-medium text-slate-700 mb-1" for="username">Username</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-xl leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 sm:text-sm transition duration-150 ease-in-out" id="username" name="username" placeholder="Enter your username" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div data-purpose="form-group-password">
<div class="flex items-center justify-between mb-1">
<label class="block text-sm font-medium text-slate-700" for="password">Password</label>
<a class="text-sm font-medium text-brand-600 hover:text-brand-500" href="forgot_password.html">
Forgot password?
</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-xl leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 sm:text-sm transition duration-150 ease-in-out" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Login Button -->
<div data-purpose="login-action">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors duration-200" type="submit">
              Sign in
            </button>
</div>
</form>
<div class="mt-8">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-white text-slate-500">New to the platform?</span>
</div>
</div>
<!-- Register Link/Button -->
<div class="mt-6" data-purpose="register-action">
<button class="w-full flex justify-center py-3 px-4 border-2 border-slate-100 rounded-xl text-sm font-semibold text-slate-700 bg-slate-50 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-200 transition-colors duration-200" type="button" <button type="button" onclick="window.location.href='registration.html'">
              Create an account
            </button>
</div>
</div>
</div>
<!-- Card Footer Information -->
<div class="px-8 py-4 bg-slate-50 border-t border-slate-100 flex justify-center">
<p class="text-xs text-slate-400">© 2026 Expense Management Inc. Secure Login.</p>
</div>
</div>
<!-- END: LoginCard -->
</main>
<!-- END: MainContent -->
 <script src="js/login.js"></script>
</body></html>
